bt_navigator_navigate_through_poses_rclcpp_node:
  ros__parameters:
    use_sim_time: false

bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: false

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: progress_checker
    goal_checker_plugins: [general_goal_checker]
    controller_plugins: [FollowPath]
    odom_topic: /odom
    cmd_vel_topic: /cmd_vel_nav
    progress_checker:
      plugin: nav2_controller::SimpleProgressChecker
      required_movement_radius: 0.1
      movement_time_allowance: 10.0
    general_goal_checker:
      stateful: true
      plugin: nav2_controller::SimpleGoalChecker
      xy_goal_tolerance: 0.5
      yaw_goal_tolerance: 0.35
    FollowPath:
      plugin: nav2_mppi_controller::MPPIController
      time_steps: 32
      model_dt: 0.05
      batch_size: 500
      iteration_count: 1
      vx_std: 0.24
      vy_std: 0.0
      wz_std: 0.80
      vx_max: 0.50
      vx_min: -0.24
      vy_max: 0.0
      wz_max: 1.5
      ax_max: 1.35
      ax_min: -1.35
      ay_max: 0.0
      az_max: 2.0
      temperature: 0.3
      gamma: 0.015
      motion_model: DiffDrive
      visualize: false
      retry_attempt_limit: 1
      prune_distance: 0.25
      transform_tolerance: 0.8
      enforce_path_inversion: false
      reset_period: 1.0
      critics: [
        "ConstraintCritic",
        "CostCritic",
        "GoalCritic",
        "GoalAngleCritic",
        "PathAlignCritic",
        "PathFollowCritic",
        "PathAngleCritic",
        "PreferForwardCritic"
      ]
      ConstraintCritic.enabled: true
      ConstraintCritic.cost_power: 1
      ConstraintCritic.cost_weight: 4.0
      CostCritic.enabled: true
      CostCritic.cost_power: 1
      CostCritic.cost_weight: 4.5
      CostCritic.critical_cost: 650.0
      CostCritic.consider_footprint: true
      CostCritic.collision_cost: 1000000.0
      CostCritic.near_goal_distance: 1.0
      GoalCritic.enabled: true
      GoalCritic.cost_power: 1
      GoalCritic.cost_weight: 5.0
      GoalCritic.threshold_to_consider: 1.8
      GoalAngleCritic.enabled: true
      GoalAngleCritic.cost_power: 1
      GoalAngleCritic.cost_weight: 2.5
      GoalAngleCritic.threshold_to_consider: 1.6
      PathAlignCritic.enabled: true
      PathAlignCritic.cost_power: 1
      PathAlignCritic.cost_weight: 5.5
      PathAlignCritic.threshold_to_consider: 0.8
      PathFollowCritic.enabled: true
      PathFollowCritic.cost_power: 1
      PathFollowCritic.cost_weight: 4.5
      PathFollowCritic.threshold_to_consider: 1.4
      PathAngleCritic.enabled: true
      PathAngleCritic.cost_power: 1
      PathAngleCritic.cost_weight: 3.5
      PathAngleCritic.threshold_to_consider: 1.0
      PreferForwardCritic.enabled: true
      PreferForwardCritic.cost_power: 1
      PreferForwardCritic.cost_weight: 0.02
      PreferForwardCritic.threshold_to_consider: 0.3

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 15.0
      publish_frequency: 10.0
      always_send_full_costmap: false
      global_frame: odom
      robot_base_frame: base_footprint
      rolling_window: true
      width: 8
      height: 8
      resolution: 0.05
      footprint_padding: 0.01
      footprint: "[ [0.360, 0.200], [0.360, -0.200], [-0.450, -0.200], [-0.450, 0.200] ]"
      plugins: [voxel_layer, inflation_layer]
      voxel_layer:
        plugin: nav2_costmap_2d::VoxelLayer
        enabled: true
        publish_voxel_map: false
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: false
          marking: true
          observation_persistence: 2.0
          data_type: LaserScan
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 3.0
          obstacle_min_range: 0.0
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        cost_scaling_factor: 8.0
        inflation_radius: 0.12

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 1.0
      publish_frequency: 1.0
      always_send_full_costmap: false
      global_frame: map
      robot_base_frame: base_footprint
      footprint_padding: 0.02
      footprint: "[ [0.360, 0.200], [0.360, -0.200], [-0.450, -0.200], [-0.450, 0.200] ]"
      resolution: 0.05
      track_unknown_space: false
      plugins: [static_layer, obstacle_layer, inflation_layer]
      static_layer:
        plugin: nav2_costmap_2d::StaticLayer
        map_subscribe_transient_local: true
      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        observation_sources: scan
        footprint_clearing_enabled: true
        scan:
          topic: /scan
          data_type: LaserScan
          marking: true
          clearing: true
          raytrace_max_range: 6.0
          raytrace_min_range: 0.20
          obstacle_max_range: 4.0
          obstacle_min_range: 0.20
          inf_is_valid: true
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        cost_scaling_factor: 8.0
        inflation_radius: 0.18

map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: ""

planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 20.0
    planner_plugins: [GridBased]
    GridBased:
      plugin: nav2_smac_planner/SmacPlannerHybrid
      tolerance: 0.25
      downsample_costmap: false
      downsampling_factor: 1
      allow_unknown: false
      max_iterations: 250000
      max_on_approach_iterations: 1000
      motion_model_for_search: REEDS_SHEPP
      angle_quantization_bins: 64
      analytic_expansion_ratio: 3.5
      analytic_expansion_max_length: 2.8
      minimum_turning_radius: 0.48
      reverse_penalty: 1.8
      change_penalty: 0.0
      non_straight_penalty: 1.45
      cost_penalty: 5.0
      retrospective_penalty: 0.025
      allow_reverse_expansion: true
      cache_obstacle_heuristic: true

behavior_server:
  ros__parameters:
    use_sim_time: false
    local_frame: odom
    global_frame: map
    robot_base_frame: base_footprint
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: [spin, backup, drive_on_heading, assisted_teleop, wait]
    spin:
      plugin: nav2_behaviors/Spin
    backup:
      plugin: nav2_behaviors/BackUp
    drive_on_heading:
      plugin: nav2_behaviors/DriveOnHeading
    assisted_teleop:
      plugin: nav2_behaviors/AssistedTeleop
    wait:
      plugin: nav2_behaviors/Wait

waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: wait_at_waypoint
    wait_at_waypoint:
      plugin: nav2_waypoint_follower::WaitAtWaypoint
      enabled: true
      waypoint_pause_duration: 0

velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 30.0
    scale_velocities: false
    feedback: OPEN_LOOP
    max_velocity: [0.50, 0.0, 1.5]
    min_velocity: [-0.24, 0.0, -1.5]
    max_accel: [1.35, 0.0, 2.0]
    max_decel: [-1.35, 0.0, -2.0]
    odom_topic: /odom
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0
